  <line x1="449" y1="130" x2="467" y2="130" stroke="#9b9869" stroke-width="1.5" marker-end="url(#arr-sage)" style="fill:rgb(0, 0, 0);stroke:rgb(155, 152, 105);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="541" y1="130" x2="559" y2="130" stroke="#9b9869" stroke-width="1.5" marker-end="url(#arr-sage)" style="fill:rgb(0, 0, 0);stroke:rgb(155, 152, 105);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Balancing return path (dashed) -->
  <path d="M 597 148 L 597 205 L 413 205 L 413 148" fill="none" stroke="#9b9869" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-sage)" style="fill:none;stroke:rgb(155, 152, 105);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-dasharray:5px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="505" y="228" font-family="'Crimson Text',Georgia,serif" font-size="10" font-style="italic" fill="#6b6450" text-anchor="middle" style="fill:rgb(107, 100, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Crimson Text&quot;, Georgia, serif;font-size:10px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">output opposes input ↺</text>

