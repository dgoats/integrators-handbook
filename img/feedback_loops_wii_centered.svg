  <line x1="119" y1="130" x2="137" y2="130" stroke="#efaa1f" stroke-width="1.5" marker-end="url(#arr-gold)" style="fill:rgb(0, 0, 0);stroke:rgb(239, 170, 31);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="211" y1="130" x2="229" y2="130" stroke="#efaa1f" stroke-width="1.5" marker-end="url(#arr-gold)" style="fill:rgb(0, 0, 0);stroke:rgb(239, 170, 31);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Reinforcing return path -->
  <path d="M 267 148 L 267 205 L 83 205 L 83 148" fill="none" stroke="#efaa1f" stroke-width="1.5" marker-end="url(#arr-gold)" style="fill:none;stroke:rgb(239, 170, 31);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="175" y="228" font-family="'Crimson Text',Georgia,serif" font-size="10" font-style="italic" fill="#6b6450" text-anchor="middle" style="fill:rgb(107, 100, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Crimson Text&quot;, Georgia, serif;font-size:10px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">output reinforces input ↻</text>

  <!-- ═══ RIGHT: Balancing loop ═══ -->
  <rect x="358" y="38" width="294" height="236" rx="10" fill="rgb(245,240,225)" stroke="#9b9869" stroke-width="1" style="fill:rgb(245, 240, 225);stroke:rgb(155, 152, 105);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="358" y="38" width="294" height="34" rx="10" fill="#9b9869" style="fill:rgb(155, 152, 105);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="358" y="55" width="294" height="17" fill="#9b9869" style="fill:rgb(155, 152, 105);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="505" y="60" font-family="'Archivo',sans-serif" font-size="13" font-weight="600" fill="rgb(24,20,17)" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24, 20, 17);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Archivo, sans-serif;font-size:13px;font-weight:600;text-anchor:middle;dominant-baseline:central">Balancing loop</text>
  <text x="505" y="88" font-family="'Archivo',sans-serif" font-size="10" fill="#6b6450" text-anchor="middle" style="fill:rgb(107, 100, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Archivo, sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">resists change, seeks equilibrium</text>

