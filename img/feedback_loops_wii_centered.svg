  <rect x="469" y="112" width="72" height="36" rx="5" fill="rgb(24,20,17)" stroke="#9b9869" stroke-width="0.5" style="fill:rgb(24, 20, 17);stroke:rgb(155, 152, 105);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="505" y="130" font-family="'Archivo',sans-serif" font-size="12" font-weight="500" fill="#9b9869" text-anchor="middle" dominant-baseline="central" style="fill:rgb(155, 152, 105);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Archivo, sans-serif;font-size:12px;font-weight:500;text-anchor:middle;dominant-baseline:central">System</text>

  <!-- Output: x=561, center=597 -->
  <rect x="561" y="112" width="72" height="36" rx="5" fill="rgb(24,20,17)" stroke="#9b9869" stroke-width="0.5" style="fill:rgb(24, 20, 17);stroke:rgb(155, 152, 105);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
