  <rect x="28" y="38" width="294" height="34" rx="10" fill="#efaa1f" style="fill:rgb(239, 170, 31);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="28" y="55" width="294" height="17" fill="#efaa1f" style="fill:rgb(239, 170, 31);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="175" y="60" font-family="'Archivo',sans-serif" font-size="13" font-weight="600" fill="rgb(24,20,17)" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24, 20, 17);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Archivo, sans-serif;font-size:13px;font-weight:600;text-anchor:middle;dominant-baseline:central">Reinforcing loop</text>
  <text x="175" y="88" font-family="'Archivo',sans-serif" font-size="10" fill="#6b6450" text-anchor="middle" style="fill:rgb(107, 100, 80);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Archivo, sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">amplifies change in one direction</text>

  <!-- Input: x=47, center=83 -->
  <rect x="47" y="112" width="72" height="36" rx="5" fill="rgb(24,20,17)" stroke="#efaa1f" stroke-width="0.5" style="fill:rgb(24, 20, 17);stroke:rgb(239, 170, 31);color:rgb(255, 255, 255);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
